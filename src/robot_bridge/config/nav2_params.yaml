amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    map_topic: "map"
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    # ⚠️ สำคัญมาก: ปิดการกระจาย TF ของ AMCL เพื่อไม่ให้ชนกับ EKF!
    tf_broadcast: False
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    # ใช้ต้นไม้พฤติกรรมมาตรฐาน
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
 
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0 # ความถี่ในการประมวลผล (Real-world hardware limit)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.01  # ลดลงเพื่อให้ไม่ abort ง่าย
      movement_time_allowance: 60.0   # เพิ่มเวลาเพื่อให้มีโอกาสหมุนตัวได้นานขึ้น
    
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.10

    FollowPath:
      # ✅ เปลี่ยนมาใช้ตัว Shim สำหรับรถตัดหญ้าคันจริง
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      angular_dist_threshold: 0.785   # ถ้ามุมต่างกันเกิน 45 องศา ให้หมุนตัวอยู่กับที่ก่อน
      forward_sampling_distance: 0.2  # ระยะมองข้างหน้าที่ใช้เช็คทิศทาง
      rotate_to_heading_angular_vel: 1.0 # เพิ่มจาก 0.5 เพื่อให้มีแรงส่ง
      max_angular_accel: 2.5             # เพิ่มอัตราเร่งจาก 2.0 ให้ Snappy ขึ้น
      
      # 🛠️ พารามิเตอร์ของ RPP (Primary Controller)
      desired_linear_vel: 0.4
      max_robot_pose_search_dist: 10.0
      use_velocity_scaled_lookahead_dist: true
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.6
      lookahead_time: 1.0
      transform_tolerance: 0.1
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.2
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.5
      max_angular_accel: 2.5
      min_angular_accel: 1.3
      min_rotational_vel: 0.6            # เพิ่มขั้นต่ำเพื่อให้มีแรงขัดสายพาน
      max_rotational_vel: 1.2            # ปรับเพดานเป็น 1.2
      rotation_precision: 0.2            # ลดความละเอียดในการหยุดหมุนเพื่อให้ไวขึ้น
      allow_reversing: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      transform_tolerance: 2.0  # แก้ TF Extrapolation
      # รัศมีตัวรถ (ปรับตามรถตัดหญ้าจริง)
      robot_radius: 0.3
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: ultrasonic
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
        ultrasonic:
          topic: /ultrasonic_pointcloud
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: False
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: false
      robot_radius: 0.3
      resolution: 0.05
      transform_tolerance: 2.0  # แก้ TF Extrapolation
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: ultrasonic
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
        ultrasonic:
          topic: /ultrasonic_pointcloud
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: False
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true # อนุญาตให้ลากเส้นผ่านจุดที่ไม่มีเซ็นเซอร์ได้
    transform_tolerance: 2.0

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.2
    min_rotational_vel: 0.1
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 10.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.4, 0.0, 1.2]
    min_velocity: [-0.4, 0.0, -1.2]
    max_accel: [0.5, 0.0, 2.5]   # ลดอัตราเร่งเดินตรงจาก 2.0 เหลือ 0.5 เพื่อให้นุ่มนวล
    max_decel: [-1.0, 0.0, -2.5] # ลดอัตราเบรกเดินตรงจาก -2.0 เหลือ -1.0
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.5
    # ⚠️ จัดระเบียบท่อสัญญาณใหม่ (ใช้ชื่อแบบ Absolute เพื่อป้องกันสัญญาณหลงทาง)
    feedback_velocity_topic: "/odometry/filtered"
    cmd_vel_in_topic: "/cmd_vel_nav_raw"
    cmd_vel_out_topic: "/cmd_vel_nav_smoothed"