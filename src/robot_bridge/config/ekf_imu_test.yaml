# EKF IMU-Only Test Config
# ใช้สำหรับทดสอบ RealSense IMU บนโน้ตบุ๊กโดยไม่ต้องต่อ STM32
# เมื่อต่อรถจริงแล้ว → เปลี่ยนกลับมาใช้ ekf.yaml ตัวหลัก

ekf_filter_node_odom:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    sensor_timeout: 0.5
    two_d_mode: false  # ปิด 2D mode เพื่อให้เห็น Roll/Pitch ตอนเอียงกล้อง
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ไม่มี odom0 เลย → EKF ทำงานจาก IMU ตัวเดียว

    imu0: /camera/camera/imu
    imu0_config: [false, false, false,
                  false, false, false, # ไม่ใช้ Orientation (กล้องส่ง 0 มาเสมอ)
                  false, false, false,
                  true,  true,  true,  # ใช้ Angular Velocity ทุกแกน (X, Y, Z)
                  false, false, false]
    imu0_relative: true
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
